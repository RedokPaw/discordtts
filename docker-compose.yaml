services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discordtts
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - TOKEN=${TOKEN}
      - PORT=${PORT:-8080}
      - JAVA_OPTS=-Xms256m -Xmx512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3